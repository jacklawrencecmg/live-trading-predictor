name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install aiosqlite pytest-asyncio

      - name: Run linting
        run: |
          cd backend
          pip install flake8
          flake8 app/ tests/ --max-line-length=120 --ignore=E203,W503 || true

      - name: Run type checks
        run: |
          cd backend
          pip install mypy
          mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-checks:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Lint
        run: |
          cd frontend
          npx next lint || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t options-research-backend ./backend

      - name: Build frontend image
        run: docker build -t options-research-frontend ./frontend
