[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Registered marks ──────────────────────────────────────────────────────────
# Any mark not listed here causes a warning with --strict-markers.
markers =
    leakage: Feature pipeline leakage regression tests (L1-L9). Always run. Blocking gate.
    calibration: Brier score and ECE regression tests. Blocking on model or inference changes.
    risk_critical: Risk manager, kill switch, paper trader, governance — sensitive execution paths.
    integration: End-to-end tests requiring live PostgreSQL and Redis. Skip in unit-test CI runs.
    slow: Tests taking > 5 seconds. Excluded from fast dev loops with -m "not slow".
    unit: Pure unit tests with no I/O dependencies.

# ── Default run options ───────────────────────────────────────────────────────
addopts =
    -ra
    --strict-markers
    --tb=short

# ── Warning filters ───────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:distutils
    ignore::DeprecationWarning:pydantic
    error::pytest.PytestUnraisableExceptionWarning

# ── Test selection shortcuts (use with: pytest -m <name>) ─────────────────────
#
#   Fast unit loop:          pytest -m "not integration and not slow"
#   Leakage only (CI gate):  pytest -m leakage
#   Calibration gate:        pytest -m calibration
#   Risk-critical:           pytest -m risk_critical
#   Full suite:              pytest
#   Integration only:        pytest -m integration  (requires live services)
